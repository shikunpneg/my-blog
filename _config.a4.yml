# ---------------------------------------------------------------
# Hexo Theme A4 - 复古打印机风格 + 全功能开启版
# 适用于 https://github.com/HiNinoJay/hexo-theme-A4
# ---------------------------------------------------------------

menu:
  首页: /           # ✅ 已开启（需要 hexo new page index）
  文章: /list/     # ✅ 已开启（需要 hexo new page list）
  # 关于: /about/
  # 标签: /tags/
  # 分类: /categories/

showInMenu:
  - 文章            # ✅ 首页会显示“文章”链接

index:
  header:
    - "The quick brown fox jumps over the lazy dog"
    - "Hello, world!"
    - "Keep it simple, stupid."
  hitokoto: false
  footer: Email:your@email.com   # 改成你的邮箱
  titlePosition: left
  width: small
  list: false

footerLink:
  info: © 2025 Powered by Hexo & A4

post:
  footer: "⚙️ 打字机的声音，纸墨的香气"
  themeInfo: true
  width: middle
  titlePosition: center

favicon: /img/favicon.webp
isRoundedAvatar: false
isAvatarRotating: false
displayTitleInTab: true

# 🛠️ 所有特色工具全部开启
tool:
  darkMode: true
  returnToTop: true
  returnToLast: true
  topToc: true
  leftToc: true
  recentUpdatePost: true    # 开启最近更新模块

indexInfo:
  allWordCount: true
  allViewCount: true

postInfo:
  updateDate: true
  wordCount: true
  readTime: true
  viewCount: true
  prevAndNextLink:
    status: true
    prevInfo: "〈 上一篇"
    nextInfo: "下一篇 〉"
  endContent: "以上"

listInfo:
  enable: true
  hoverStyle: underline
  hoverColor: "#8b5a2b"
  animationDuration: 800

cdn:
  enable: false          # 关闭CDN，让自定义样式立即生效
  choose: zzko

# 🎨 复古配色（复古纸张底色 + 深棕色文字）
color:
  enable: true
  font: "#3e2a1f"              # 深褐色文字，像老式打字机色带
  background: "#d9c8a9"        # 仿牛皮纸背景
  indexBackGround: "#f0e5cf"   # 首页浅米色
  postBackGround: "#fdfaf3"    # 文章页仿旧纸张
  codeBackGround: "#e6dcc8"    # 代码区块浅米色
  codeFont: "#8b5a2b"          # 代码字体褐色
  linkBeforeClick: "#8b4513"   # 链接未点击 – 皮革棕
  linkAfterClick: "#a0522d"    # 已点击 – 陶土色

# 背景图片（可选，为了复古可以放一张纸张纹理）
imageShow:
  enable: false
  background: /img/paper.jpg

# ✍️ 字体：强制使用等宽打字机风格（通过 custom.css 实现更彻底）
font:
  enable: true
  LXGWWenKai: false            # 关闭霞鹜文楷，改用等宽字体

# 图片幻灯片
lightgallery:
  thumbnail: true
  zoom: true
  rotate: true
  autoplay: true
  fullScreen: true
  pager: false

# 评论系统配置
comment:
  enable: true
  use: giscus
  giscus:
    repo: "shikunpneg/my-blog-comments"
    repoId: "R_kgDOS7Naug"
    category: "Announcements"
    categoryId: "DIC_kwDOS7Naus4C_MLE"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    theme: "preferred_color_scheme"
    lang: "zh-CN"
# 🔌 注入自定义样式（实现打印机字体、打字机光标效果等）
inject:
  css: css/custom.css

baseElement:
  href:
  target:


version: v2.0.1
